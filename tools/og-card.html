<!DOCTYPE html>
<html><head><meta charset="utf-8"><style>
  *{margin:0;box-sizing:border-box}
  html,body{width:1200px;height:630px;overflow:hidden}
  body{background:#05070a;color:#e7e9ea;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
    background-image:linear-gradient(to right,rgba(161,161,170,.06) 1px,transparent 1px),linear-gradient(to bottom,rgba(161,161,170,.06) 1px,transparent 1px);
    background-size:48px 48px;position:relative}
  .pad{position:absolute;inset:0;padding:78px 84px;display:flex;flex-direction:column;justify-content:space-between}
  .mark{font-family:"SF Mono",ui-monospace,Menlo,monospace;font-size:30px;color:#28d9f2;letter-spacing:.02em}
  h1{font-size:92px;line-height:1.0;letter-spacing:-.02em;font-weight:800;max-width:18ch}
  h1 em{font-style:italic}
  .sub{font-size:30px;color:#9aa0a6;margin-top:26px;max-width:30ch}
  .row{font-family:"SF Mono",ui-monospace,Menlo,monospace;font-size:26px;color:#6b7177}
  .row b{color:#28d9f2;font-weight:400}
</style></head>
<body><div class="pad">
  <div class="mark">capabilities.txt</div>
  <div>
    <h1>Declare what your site can <em>do</em>.</h1>
    <div class="sub">The open convention for agents to discover what a site can do.</div>
  </div>
  <div class="row">robots.txt &nbsp;·&nbsp; sitemap.xml &nbsp;·&nbsp; llms.txt &nbsp;·&nbsp; <b>capabilities.txt</b></div>
</div></body></html>
